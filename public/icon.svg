<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#E65100"/>
  <g transform="translate(256,240)" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fulcrum point -->
    <circle cx="0" cy="-130" r="18" fill="#fff" stroke="none"/>
    <!-- Center post -->
    <line x1="0" y1="-112" x2="0" y2="130" stroke-width="26"/>
    <!-- Beam -->
    <line x1="-150" y1="-90" x2="150" y2="-90" stroke-width="26"/>
    <!-- Left chain -->
    <line x1="-130" y1="-90" x2="-130" y2="10" stroke-width="18"/>
    <!-- Right chain -->
    <line x1="130" y1="-90" x2="130" y2="10" stroke-width="18"/>
    <!-- Left pan -->
    <path d="M-180 10 Q-130 80 -80 10" stroke-width="20" fill="none"/>
    <!-- Right pan -->
    <path d="M80 10 Q130 80 180 10" stroke-width="20" fill="none"/>
    <!-- Base -->
    <line x1="-70" y1="130" x2="70" y2="130" stroke-width="26"/>
  </g>
</svg>
