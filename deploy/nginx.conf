# ─── Judge Arena — Nginx Reverse Proxy Configuration ──────────────────────
#
# Features:
#   - SSL termination (Let's Encrypt)
#   - HTTP/2
#   - Gzip compression
#   - Security headers
#   - SSE passthrough (no buffering)
#   - Rate limiting at the edge
#   - WebSocket support (future)
#
# Usage:
#   1. Replace YOUR_DOMAIN.COM with your actual domain
#   2. Run certbot to obtain SSL certificates
#   3. Reload nginx: sudo nginx -s reload
#

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

upstream judge_arena {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.COM;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.COM;

    # ─── SSL Configuration ──
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Security Headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ─── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript application/x-yaml;

    # ─── Client Settings ──
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ─── Proxy Defaults ──
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # ─── Health Check (no rate limit) ──
    location = /api/health {
        proxy_pass http://judge_arena;
        access_log off;
    }

    # ─── Auth Endpoints (strict rate limit) ──
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://judge_arena;
    }

    # ─── SSE Endpoint (no buffering) ──
    location = /api/events {
        proxy_pass http://judge_arena;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }

    # ─── API Endpoints (general rate limit) ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://judge_arena;
        proxy_read_timeout 120s;  # LLM requests can be slow
    }

    # ─── Static Assets (aggressive caching) ──
    location /_next/static/ {
        proxy_pass http://judge_arena;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── All Other Requests ──
    location / {
        proxy_pass http://judge_arena;
        proxy_read_timeout 60s;
    }

    # ─── Error Pages ──
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
